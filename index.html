<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('Image/bg.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.38) saturate(1.2);
      z-index: 0;
    }

    /* ── STARS CANVAS ── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── CENTER CONTENT ── */
    .center {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    /* ── PLANE BUTTON ── */
    #plane-btn {
      background: none;
      border: none;
      cursor: pointer;
      outline: none;
      position: relative;
      filter:
        drop-shadow(0 0 18px rgba(80, 180, 255, 0.9))
        drop-shadow(0 0 40px rgba(80, 180, 255, 0.5));
      transition: filter 0.3s ease, transform 0.3s ease;
      animation: float 3.5s ease-in-out infinite;
    }

    #plane-btn:hover {
      filter:
        drop-shadow(0 0 28px rgba(120, 210, 255, 1))
        drop-shadow(0 0 60px rgba(80, 180, 255, 0.8))
        drop-shadow(0 0 90px rgba(0, 140, 255, 0.4));
      transform: scale(1.06);
      animation-play-state: paused;
    }

    #plane-btn svg {
      width: 180px;
      height: 180px;
      display: block;
    }

    /* Float idle animation */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      33%       { transform: translateY(-14px) rotate(1.5deg); }
      66%       { transform: translateY(-6px) rotate(-1deg); }
    }

    /* Fly-away animation — added via JS */
    @keyframes fly-away {
      0%   { transform: translate(0, 0) rotate(-10deg) scale(1);   opacity: 1; }
      30%  { transform: translate(80px, -120px) rotate(20deg) scale(1.15); opacity: 1; }
      100% { transform: translate(900px, -700px) rotate(35deg) scale(0.3); opacity: 0; }
    }

    .flying {
      animation: fly-away 1.1s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
    }

    /* ── WELCOME TEXT ── */
    .welcome-text {
      text-align: center;
      color: #fff;
      pointer-events: none;
      user-select: none;
    }

    .welcome-text h1 {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a8d8ff 0%, #ffffff 45%, #60b8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 2px 16px rgba(80, 160, 255, 0.6));
    }

    .welcome-text p {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      color: rgba(180, 220, 255, 0.75);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── HINT LABEL ── */
    .hint {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.78rem;
      color: rgba(160, 210, 255, 0.5);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      animation: pulse-hint 2.2s ease-in-out infinite;
    }

    @keyframes pulse-hint {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.9; }
    }

    /* ── SCREEN FLASH on redirect ── */
    .flash-overlay {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      z-index: 999;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .flash-overlay.active {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Background layer -->
  <div class="bg"></div>

  <!-- Stars -->
  <canvas id="stars-canvas"></canvas>

  <!-- Flash overlay for redirect -->
  <div class="flash-overlay" id="flash"></div>

  <!-- Center content -->
  <div class="center">
    <div class="welcome-text">
      <h1>Welcome</h1>
      <p>Ready for takeoff?</p>
    </div>

    <!-- Airplane logo button -->
    <button id="plane-btn" title="Click to fly">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
        <!-- Glow circle -->
        <circle cx="100" cy="100" r="88" fill="rgba(60,140,255,0.08)" stroke="rgba(100,180,255,0.18)" stroke-width="1.5"/>

        <!-- Plane body -->
        <g transform="translate(100,100) rotate(-40)">
          <!-- Main fuselage -->
          <ellipse cx="0" cy="0" rx="9" ry="54" fill="url(#bodyGrad)" />

          <!-- Nose cone -->
          <ellipse cx="0" cy="-54" rx="9" ry="14" fill="url(#noseGrad)" />

          <!-- Main wings -->
          <path d="M 0,-10 L -62,30 L -52,36 L 0,8 L 52,36 L 62,30 Z"
                fill="url(#wingGrad)" />

          <!-- Wing tip edge highlight -->
          <path d="M 0,-10 L -62,30" stroke="rgba(180,220,255,0.5)" stroke-width="0.8" />
          <path d="M 0,-10 L 62,30"  stroke="rgba(180,220,255,0.5)" stroke-width="0.8" />

          <!-- Horizontal stabilizer -->
          <path d="M 0,36 L -28,52 L -24,56 L 0,44 L 24,56 L 28,52 Z"
                fill="url(#stabGrad)" />

          <!-- Vertical stabilizer / tail fin -->
          <path d="M -4,28 L -4,52 L 4,52 L 4,28 Z"
                fill="url(#tailGrad)" />
          <path d="M -3,28 L -14,44 L -4,44 Z"
                fill="rgba(120,190,255,0.6)" />

          <!-- Engine pod left -->
          <ellipse cx="-30" cy="16" rx="6" ry="11" fill="url(#engGrad)" />
          <ellipse cx="-30" cy="6"  rx="6" ry="4"  fill="rgba(60,130,230,0.7)" />

          <!-- Engine pod right -->
          <ellipse cx="30" cy="16" rx="6" ry="11" fill="url(#engGrad)" />
          <ellipse cx="30" cy="6"  rx="6" ry="4"  fill="rgba(60,130,230,0.7)" />

          <!-- Cockpit windows -->
          <ellipse cx="-3" cy="-48" rx="2.5" ry="3.5" fill="rgba(180,230,255,0.85)" />
          <ellipse cx="3"  cy="-48" rx="2.5" ry="3.5" fill="rgba(180,230,255,0.85)" />

          <!-- Cabin window strip -->
          <rect x="-4" y="-30" width="8" height="1.5" rx="0.75" fill="rgba(200,235,255,0.4)" />
          <rect x="-4" y="-24" width="8" height="1.5" rx="0.75" fill="rgba(200,235,255,0.4)" />
          <rect x="-4" y="-18" width="8" height="1.5" rx="0.75" fill="rgba(200,235,255,0.4)" />
          <rect x="-4" y="-12" width="8" height="1.5" rx="0.75" fill="rgba(200,235,255,0.4)" />
        </g>

        <!-- Orbit ring -->
        <ellipse cx="100" cy="100" rx="78" ry="24"
                 stroke="rgba(80,170,255,0.22)" stroke-width="1"
                 stroke-dasharray="6 5" fill="none"
                 transform="rotate(-20,100,100)" />

        <!-- Defs: gradients -->
        <defs>
          <linearGradient id="bodyGrad" x1="-1" y1="-54" x2="1" y2="54" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#c8e8ff"/>
            <stop offset="40%"  stop-color="#70b8ff"/>
            <stop offset="100%" stop-color="#2060c0"/>
          </linearGradient>
          <linearGradient id="noseGrad" x1="0" y1="-68" x2="0" y2="-40" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#e0f2ff"/>
            <stop offset="100%" stop-color="#80c0ff"/>
          </linearGradient>
          <linearGradient id="wingGrad" x1="-62" y1="30" x2="62" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#4090e0"/>
            <stop offset="50%"  stop-color="#a8d4ff"/>
            <stop offset="100%" stop-color="#4090e0"/>
          </linearGradient>
          <linearGradient id="stabGrad" x1="-28" y1="52" x2="28" y2="56" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#3070c0"/>
            <stop offset="50%"  stop-color="#90c0f0"/>
            <stop offset="100%" stop-color="#3070c0"/>
          </linearGradient>
          <linearGradient id="tailGrad" x1="-4" y1="28" x2="4" y2="52" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#80b8f0"/>
            <stop offset="100%" stop-color="#2050a0"/>
          </linearGradient>
          <linearGradient id="engGrad" x1="-6" y1="6" x2="6" y2="27" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#90c8ff"/>
            <stop offset="100%" stop-color="#204888"/>
          </linearGradient>
        </defs>
      </svg>
    </button>

    <span class="hint">click to fly</span>
  </div>

  <script>
    /* ── STARS ── */
    (function () {
      const canvas = document.getElementById('stars-canvas');
      const ctx = canvas.getContext('2d');

      const STAR_COUNT = 220;
      const stars = [];

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // Generate stars
      for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({
          x:       Math.random(),
          y:       Math.random(),
          r:       Math.random() * 1.8 + 0.3,
          alpha:   Math.random(),
          speed:   Math.random() * 0.008 + 0.003,
          phase:   Math.random() * Math.PI * 2,
          color:   Math.random() < 0.25
                     ? `rgba(180,220,255,`
                     : Math.random() < 0.5
                       ? `rgba(255,255,255,`
                       : `rgba(200,235,255,`,
        });
      }

      let t = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const W = canvas.width, H = canvas.height;

        stars.forEach(s => {
          const a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
          ctx.beginPath();
          ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
          ctx.fillStyle = s.color + a.toFixed(3) + ')';
          ctx.fill();

          // Sparkle cross on brighter stars
          if (s.r > 1.4 && a > 0.7) {
            const len = s.r * 4;
            ctx.strokeStyle = s.color + (a * 0.45).toFixed(3) + ')';
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(s.x * W - len, s.y * H);
            ctx.lineTo(s.x * W + len, s.y * H);
            ctx.moveTo(s.x * W, s.y * H - len);
            ctx.lineTo(s.x * W, s.y * H + len);
            ctx.stroke();
          }
        });

        t += 1 / 60;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── PLANE CLICK ── */
    const btn   = document.getElementById('plane-btn');
    const flash = document.getElementById('flash');
    let clicked = false;

    btn.addEventListener('click', function () {
      if (clicked) return;
      clicked = true;

      // Stop idle float, start fly-away
      btn.classList.add('flying');

      // After plane disappears, flash white then redirect
      setTimeout(() => {
        flash.classList.add('active');
        setTimeout(() => {
          window.location.href = 'main.html';
        }, 280);
      }, 950);
    });
  </script>
</body>
</html>
